// ─── API ─────────────────────────────────────────────────────────────────────
const callAI = async (messages, max=1000) => {
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages})
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message);
  return (d.content||[]).map(b=>b.text||"").join("").trim();
};
const aiText = (p,max=1000) => callAI([{role:"user",content:p}],max);
const aiMulti = (imgs,prompt,max=1500) => callAI([{role:"user",content:[
  ...imgs.map(({b64,mime})=>({type:"image",source:{type:"base64",media_type:mime,data:b64}})),
  {type:"text",text:prompt}
]}],max);
const toB64 = f => new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});

function PropValAI() {
  const [lang,setLang] = useState("en");
  const t = T[lang];

  const [tab,setTab]       = useState("search");
  const [subTab,setSubTab] = useState({analyze:"val",tools:"fin"});
  const [busy,setBusy]     = useState({});
  const [outs,setOuts]     = useState({});
  const [mktRows,setMktRows]       = useState(null);
  const [riskItems,setRiskItems]   = useState(null);
  const [reportSecs,setReportSecs] = useState(null);
  const [searchRes,setSearchRes]   = useState(null);
  const [files,setFiles]     = useState([]);
  const [previews,setPreviews] = useState([]);
  const [anOpts,setAnOpts]   = useState({photo:true,defect:true,doc:true,val:false});
  const [schedOn,setSchedOn] = useState(false);
  const [schedDates,setSchedDates] = useState([]);
  const [saved,setSaved]     = useState(false);
  const [metrics,setMetrics] = useState({val:"—",psf:"—",bank:"—"});
  const [finV,setFinV]       = useState({price:"",rent:"",down:"10",rate:"4.0",years:"35",maint:"300"});
  const [finR,setFinR]       = useState(null);
  const [prof,setProf]       = useState({addr:"",type:"",state:"Johor Bahru, Johor",land:"",built:"",rooms:"",baths:"",year:"",price:"",tenure:"",rent:"",cond:""});
  const [sF,setSF]           = useState({state:"Johor Bahru, Johor",type:"",status:"",minp:"",maxp:"",kw:"",rooms:""});
  const fileRef = useRef();
  const dropRef = useRef();

  const setB = (k,v) => setBusy(b=>({...b,[k]:v}));
  const setO = (k,v) => setOuts(o=>({...o,[k]:v}));
  const setP = k => e => setProf(p=>({...p,[k]:e.target.value}));
  const setSv = k => e => setSF(s=>({...s,[k]:e.target.value}));

  const run = async (key,prompt,max=1000) => {
    setB(key,true);setO(key,null);
    try{const tx=await aiText(prompt,max);setO(key,tx);return tx;}
    catch(e){setO(key,"Error: "+e.message);return "";}
    finally{setB(key,false);}
  };

  const profStr = useCallback(()=>
    `Address: ${prof.addr||"N/A"} | Type: ${prof.type||"?"} | Area: ${prof.state||"?"}\n`+
    `Land: ${prof.land||"?"}sqft | Built-up: ${prof.built||"?"}sqft | ${prof.rooms||"?"}bed ${prof.baths||"?"}bath\n`+
    `Built: ${prof.year||"?"}yr | Price: RM${prof.price||"?"} | Tenure: ${prof.tenure||"?"}\n`+
    `Est. Rent: RM${prof.rent||"?"}/mo | Condition: ${prof.cond||"N/A"}`
  ,[prof]);

  // SEARCH
  const runSearch = async () => {
    setB("search",true);setSearchRes(null);
    const criteria=`Area:${sF.state}|Type:${sF.type||t.allTypes}|Status:${sF.status||t.allStatus}|Price:RM${sF.minp||"300000"}-${sF.maxp||"1000000"}|Min Beds:${sF.rooms||"any"}|Keywords:${sF.kw||"none"}`;
    try{
      const text=await aiText(t.aiSearchPrompt(criteria),1400);
      const isZh=lang==="zh";
      const isBm=lang==="ms";
      const pattern = isZh ? /^房产\d\|/ : isBm ? /^Hartanah \d\|/i : /^Property \d\|/i;
      const lines=text.split("\n").filter(l=>l.match(pattern));
      const sumMatch = isZh ? text.match(/总结[：:](.+)/s) : isBm ? text.match(/Ringkasan[:\s](.+)/s) : text.match(/Summary[:\s](.+)/s);
      setSearchRes({lines, sum:sumMatch?.[1]?.trim()||""});
    }catch(e){setSearchRes({error:e.message});}
    finally{setB("search",false);}
  };

  const loadToProfile = (line) => {
    const p=line.split("|");
    setProf(prev=>({...prev,addr:p[1]?.trim()||prev.addr,type:p[2]?.trim()||prev.type,price:p[7]?.replace(/[^0-9]/g,"")||prev.price,rent:p[9]?.replace(/[^0-9]/g,"")||prev.rent}));
    setTab("profile");
  };

  const toggleSched = () => {
    const on=!schedOn;setSchedOn(on);
    if(on){const now=new Date();const fmt=d=>d.toLocaleDateString("en-MY",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});setSchedDates([1,3,5].map(n=>fmt(new Date(now.getTime()+n*86400000))));}
  };

  // UPLOAD
  const handleFiles = (newFiles) => {
    const valid=Array.from(newFiles).filter(f=>f.size<=10*1024*1024);
    setFiles(prev=>{const m=[...prev];valid.forEach(f=>{if(!m.find(x=>x.name===f.name))m.push(f);});return m;});
    valid.forEach(f=>{if(f.type.startsWith("image/")){const url=URL.createObjectURL(f);setPreviews(prev=>[...prev,{url,name:f.name}]);}});
  };

  const analyzeFiles = async () => {
    if(!files.length)return;
    setB("upload",true);setO("upload",null);
    const imgFiles=files.filter(f=>f.type.startsWith("image/"));
    const docFiles=files.filter(f=>!f.type.startsWith("image/"));
    const tasks=[
      anOpts.photo&&`1. ${t.photoOpt}`,
      anOpts.defect&&`2. ${t.defectOpt}`,
      anOpts.doc&&`3. ${t.docOpt}`,
      anOpts.val&&`4. ${t.valOpt}`
    ].filter(Boolean).join("\n");
    try{
      let text;
      if(imgFiles.length>0){
        const imgList=await Promise.all(imgFiles.map(async f=>({b64:await toB64(f),mime:f.type})));
        text=await aiMulti(imgList,t.aiUploadPrompt(imgList.length,tasks),1500);
      }else{
        text=await aiText(t.aiUploadDocPrompt(docFiles.map(f=>f.name).join(", "),tasks),900);
      }
      setO("upload",text);
    }catch(e){setO("upload","Error: "+e.message);}
    finally{setB("upload",false);}
  };

  // PROFILE
  const saveProfile = () => {
    if(prof.price&&prof.built){
      const v=+prof.price,b=+prof.built;
      setMetrics({val:"RM "+(Math.round(v/5000)*5000).toLocaleString(),psf:"RM "+Math.round(v/b),bank:"RM "+(Math.round(v*.93/1000)*1000).toLocaleString()});
      const nf={...finV,price:prof.price,rent:prof.rent||finV.rent};setFinV(nf);calcFin(nf);
    }
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const fillDemo = () => {
    setProf({addr:"No.18, Jalan Ros Merah 2/16, Taman Johor Jaya, 81100 JB",type:lang==="zh"?"双层排屋":lang==="ms"?"Teres Dua Tingkat":"Double Storey Terrace",state:"Johor Bahru, Johor",land:"1650",built:"1800",rooms:"4",baths:"3",year:"2008",price:"680000",tenure:lang==="zh"?"永久地契 (Freehold)":lang==="ms"?"Hak Milik Kekal (Freehold)":"Freehold",rent:"2400",cond:lang==="zh"?"翻新厨房（2020年）、新装空调3台、太阳能热水器，临近 Aeon Tebrau，学区内。":lang==="ms"?"Dapur dibaiki semula (2020), 3 penghawa dingin baharu, pemanas air solar, berhampiran Aeon Tebrau, kawasan sekolah.":"Renovated kitchen (2020), 3 new air conditioners, solar water heater. Near Aeon Tebrau, within school catchment area."});
    setMetrics({val:"RM 680,000",psf:"RM 378",bank:"RM 632,000"});
    const nf={...finV,price:"680000",rent:"2400"};setFinV(nf);calcFin(nf);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  // AI RUNS
  const runVal = async () => {
    const tx=await run("val",t.aiValPrompt(profStr()),1000);
    if(tx&&prof.price&&prof.built){const v=+prof.price,b=+prof.built;setMetrics({val:"RM "+(Math.round(v/5000)*5000).toLocaleString(),psf:"RM "+Math.round(v/b),bank:"RM "+(Math.round(v*.93/1000)*1000).toLocaleString()});}
  };

  const runMkt = async () => {
    setMktRows(null);
    const tx=await run("mkt",t.aiMktPrompt(profStr()),1000);
    if(!tx)return;
    const lines=tx.split("\n").filter(l=>l.match(/^(Comp|可比|Setanding)\s?\d/i)&&l.includes("|"));
    if(lines.length)setMktRows(lines.slice(0,3).map(l=>l.replace(/^(Comp|可比|Setanding)\s?\d[:\s]*/i,"").split("|").map(s=>s.trim())));
  };

  const runRisk = async () => {
    setRiskItems(null);
    const tx=await run("risk",t.aiRiskPrompt(profStr()),1000);
    if(!tx)return;
    setRiskItems([
      {title:t.physicalRisk,def:t.physicalDef,key:"struct"},
      {title:t.legalRisk,def:t.legalDef,key:"legal"},
      {title:t.liquidRisk,def:t.liquidDef,key:"liquid"},
      {title:t.financeRisk,def:t.financeDef,key:"fin"},
    ].map(r=>{
      const lw=tx.toLowerCase();
      const idx=lw.indexOf(r.title.toLowerCase().split(" ")[0]);
      const section=idx>=0?lw.slice(idx,idx+120):"";
      const lv=section.includes(lang==="zh"?"低风险":lang==="ms"?"rendah":"low")?"low"
        :section.includes(lang==="zh"?"高风险":lang==="ms"?"tinggi":"high")?"high":"med";
      return{...r,lv};
    }));
  };

  const genReport = async () => {
    setReportSecs(null);
    const tx=await run("report",t.aiReportPrompt(profStr()),1500);
    if(!tx)return;
    const pattern = lang==="zh" ? /【[一二三四五六]、/ : /\[(?:I{1,3}V?|VI?|VII?)\.?\s/;
    const parts=tx.split(pattern);
    if(parts.length>1){setReportSecs(parts.slice(1).map((p,i)=>({title:t.secTitles[i]||`${i+1}`,body:p.replace(/[】\]]/,"").trim()})));}
    else{setReportSecs([{title:t.secTitles[0],body:tx}]);}
  };

  // FINANCIAL
  const setFv = k => e => {const nf={...finV,[k]:e.target.value};setFinV(nf);calcFin(nf);};
  const calcFin = (f=finV) => {
    const price=+f.price||0,rent=+f.rent||0,down=+f.down||10,rate=+f.rate||4,years=+f.years||35,maint=+f.maint||300;
    if(!price){setFinR(null);return;}
    const da=price*down/100,loan=price-da,r=rate/100/12,n=years*12;
    const mo=loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
    const cf=rent-mo-maint,gy=rent*12/price*100,cap=(rent-maint)*12/price*100;
    setFinR({
      rows:[[t.downAmt,"RM "+Math.round(da).toLocaleString(),null],[t.loanAmt,"RM "+Math.round(loan).toLocaleString(),null],[t.monthlyRepay,"RM "+Math.round(mo).toLocaleString()+"/mo",null],[t.netCashflow,"RM "+Math.round(cf).toLocaleString()+"/mo",cf>=0?C.greenTxt:C.redTxt],[t.grossYield,gy.toFixed(2)+"%",null],[t.capRate,cap.toFixed(2)+"%",cap>=4?C.greenTxt:cap>=2.5?C.amberTxt:C.redTxt]],
      tip:cf>=0?t.posCashflow(Math.round(cf).toLocaleString(),cap.toFixed(2)):t.negCashflow(Math.round(Math.abs(cf)).toLocaleString())
    });
  };

  const NAV=[{id:"search",icon:"🌐",label:t.navSearch},{id:"upload",icon:"📁",label:t.navUpload},{id:"profile",icon:"🏠",label:t.navProfile},{id:"analyze",icon:"✨",label:t.navAnalyze},{id:"tools",icon:"🧮",label:t.navTools}];
  const ATABS=[{id:"val",label:t.valTab},{id:"mkt",label:t.mktTab},{id:"risk",label:t.riskTab}];
  const TTABS=[{id:"fin",label:t.finTab},{id:"report",label:t.reportTab}];
  const AREA_GROUPS = [
    { g:"Wilayah Persekutuan", areas:["Kuala Lumpur — KLCC / City Centre","Kuala Lumpur — Mont Kiara","Kuala Lumpur — Bangsar / Damansara Heights","Kuala Lumpur — Cheras","Kuala Lumpur — Kepong / Sri Damansara","Kuala Lumpur — Setapak / Wangsa Maju","Kuala Lumpur — Bukit Jalil / Sri Petaling","Kuala Lumpur — Desa ParkCity","Putrajaya","Labuan"]},
    { g:"Selangor", areas:["Petaling Jaya, Selangor","Shah Alam, Selangor","Subang Jaya, Selangor","Klang, Selangor","Puchong, Selangor","Cheras, Selangor","Ampang, Selangor","Kajang, Selangor","Cyberjaya, Selangor","Sepang, Selangor","Rawang, Selangor","Gombak, Selangor","Hulu Langat, Selangor","Kuala Selangor, Selangor","Sabak Bernam, Selangor"]},
    { g:"Johor", areas:["Johor Bahru, Johor","Iskandar Puteri, Johor","Skudai, Johor","Kulai, Johor","Pasir Gudang, Johor","Batu Pahat, Johor","Muar, Johor","Kluang, Johor","Segamat, Johor","Kota Tinggi, Johor","Pontian, Johor","Mersing, Johor"]},
    { g:"Pulau Pinang", areas:["Georgetown, Penang","Tanjung Bungah / Gurney, Penang","Bayan Lepas, Penang","Sungai Ara / Relau, Penang","Batu Ferringhi, Penang","Gelugor, Penang","Butterworth, Penang","Bukit Mertajam, Penang","Kepala Batas, Penang"]},
    { g:"Perak", areas:["Ipoh, Perak","Taiping, Perak","Teluk Intan, Perak","Lumut / Manjung, Perak","Kampar, Perak","Batu Gajah, Perak"]},
    { g:"Kedah", areas:["Alor Setar, Kedah","Sungai Petani, Kedah","Kulim, Kedah","Langkawi, Kedah","Kubang Pasu, Kedah"]},
    { g:"Pahang", areas:["Kuantan, Pahang","Temerloh, Pahang","Bentong, Pahang","Cameron Highlands, Pahang","Raub, Pahang","Genting Highlands, Pahang"]},
    { g:"Negeri Sembilan", areas:["Seremban, Negeri Sembilan","Nilai, Negeri Sembilan","Port Dickson, Negeri Sembilan","Mantin, Negeri Sembilan","Bahau, Negeri Sembilan"]},
    { g:"Melaka", areas:["Melaka City, Melaka","Ayer Keroh, Melaka","Alor Gajah, Melaka","Jasin, Melaka"]},
    { g:"Kelantan", areas:["Kota Bharu, Kelantan","Wakaf Bharu, Kelantan","Pasir Mas, Kelantan","Tanah Merah, Kelantan","Machang, Kelantan"]},
    { g:"Terengganu", areas:["Kuala Terengganu, Terengganu","Kemaman, Terengganu","Dungun, Terengganu","Besut, Terengganu"]},
    { g:"Perlis", areas:["Kangar, Perlis","Arau, Perlis","Padang Besar, Perlis"]},
    { g:"Sabah", areas:["Kota Kinabalu, Sabah","Likas / Api-Api, Sabah","Sandakan, Sabah","Tawau, Sabah","Lahad Datu, Sabah","Keningau, Sabah","Tuaran, Sabah","Beaufort, Sabah"]},
    { g:"Sarawak", areas:["Kuching, Sarawak","Miri, Sarawak","Sibu, Sarawak","Bintulu, Sarawak","Limbang, Sarawak","Sri Aman, Sarawak","Sarikei, Sarawak"]},
  ];
  const AreaSelect = ({value, onChange}) => (
    <Sel value={value} onChange={onChange}>
      {AREA_GROUPS.map(grp=>(
        <optgroup key={grp.g} label={"── "+grp.g+" ──"}>
          {grp.areas.map(a=><option key={a} value={a}>{a}</option>)}
        </optgroup>

    </Sel>

  const SubNav = ({tabs,active,onChange}) => (
    <div style={{display:"flex",background:C.bg2,borderRadius:12,padding:4,marginBottom:16,gap:2}}>

        <div>

          <div style={{fontSize:10,color:C.txt3}}>{t.appSub}</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:C.green,animation:"glow 2s infinite"}}/>

                <FG label={t.status} half><Sel value={sF.status} onChange={setSv("status")}><option value="">{t.allStatus}</option><option value="new">{t.newOnly}</option><option value="subsale">{t.subsaleOnly}</option></Sel></FG>
                <FG label={t.minBeds} half><Sel value={sF.rooms} onChange={setSv("rooms")}><option value="">{t.any}</option><option value="2">2+</option><option value="3">3+</option><option value="4">4+</option></Sel></FG>
                <FG label={t.minPrice} half><Input type="number" value={sF.minp} onChange={setSv("minp")} placeholder="300000" inputMode="numeric"/></FG>

              <FG label={t.keywords} style={{marginBottom:16}}><Input value={sF.kw} onChange={setSv("kw")} placeholder={t.keywordsPh}/></FG>
              <Btn v="primary" full icon="🔍" onClick={runSearch} disabled={busy.search} style={{marginBottom:10}}>
                {busy.search?<Spin msg={t.searching}/>:t.searchBtn}
              </Btn>
              <Btn onClick={toggleSched} full icon="⏰" style={{marginBottom:16,borderColor:schedOn?C.green:C.border2,color:schedOn?C.greenTxt:C.txt}}>
                {schedOn?t.autoSearchOn:t.autoSearch}
              </Btn>
              {schedOn&&(
                <div style={{background:C.bg1,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.txt2,marginBottom:10}}>📅 {t.schedTitle}</div>
                  {schedDates.map((d,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<2?`1px solid ${C.border}`:"none"}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:i===0?C.green:C.border2,flexShrink:0}}/>
                      <span style={{fontSize:14,color:C.txt}}>{t.schedTask} #{i+1}</span>
                      <span style={{marginLeft:"auto",fontSize:12.5,color:C.txt3}}>{d}</span>
                      {i===0&&<span style={{fontSize:10.5,padding:"2px 7px",borderRadius:20,background:C.greenBg,color:C.greenTxt,border:`1px solid ${C.green}`}}>{t.schedNext}</span>}
                    </div>
                  ))}
                </div>
              )}
              {busy.search&&<div style={{padding:"20px 0"}}><Spin msg={t.scanMsg}/></div>}
              {searchRes?.error&&<div style={{background:C.redBg,border:`1px solid ${C.red}`,borderRadius:12,padding:14,color:C.redTxt,fontSize:14}}>{t.searchFailed} {searchRes.error}</div>}
              {searchRes?.lines?.map((line,i)=>{
                const p=line.split("|");const isNew=p[3]?.toLowerCase().includes("new")||p[3]?.includes("新屋")||p[3]?.includes("Baru");
                return(
                  <div key={i} style={{background:C.bg1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:8}}>
                      <div style={{fontSize:15,fontWeight:600,color:C.txt,flex:1,lineHeight:1.3}}>{p[1]?.trim()}</div>
                      <span style={{fontSize:11,padding:"3px 8px",borderRadius:20,flexShrink:0,background:isNew?C.greenBg:C.amberBg,color:isNew?C.greenTxt:C.amberTxt,border:`1px solid ${isNew?C.green:C.amber}`}}>{isNew?t.new:t.subsale}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                      {[p[2],p[4],p[5],p[6]].filter(Boolean).map((tx,j)=><span key={j} style={{fontSize:11.5,padding:"3px 9px",borderRadius:20,background:C.bg3,color:C.txt2,border:`1px solid ${C.border2}`}}>{tx.trim()}</span>)}
                    </div>
                    <div style={{fontSize:20,fontWeight:700,color:C.blueTxt,marginBottom:4}}>{p[7]?.trim()}</div>
                    <div style={{fontSize:12.5,color:C.txt3,marginBottom:8}}>{t.psf}: {p[8]?.trim()} · {t.estRent}: {p[9]?.trim()}</div>
                    {p[10]&&<div style={{fontSize:13.5,color:C.txt2,lineHeight:1.5,marginBottom:12}}>✦ {p[10].trim()}</div>}
                    <Btn v="green" onClick={()=>loadToProfile(line)} icon="→">{t.loadBtn}</Btn>
                  </div>
                );
              })}
              {searchRes?.sum&&<><Sec>{t.summaryTitle}</Sec><AiBox text={searchRes.sum} ph=""/></>}
            </div>
          )}

          {/* ── UPLOAD ── */}
          {tab==="upload"&&(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>📁 {t.uploadTitle}</div>
              <div style={{fontSize:13,color:C.txt2,marginBottom:16}}>{t.uploadSub}</div>
              <div ref={dropRef} onClick={()=>fileRef.current?.click()}
                onDragOver={e=>{e.preventDefault();dropRef.current.style.borderColor=C.blue}}
                onDragLeave={()=>dropRef.current.style.borderColor=C.border2}
                onDrop={e=>{e.preventDefault();dropRef.current.style.borderColor=C.border2;handleFiles(e.dataTransfer.files)}}
                style={{border:`2px dashed ${C.border2}`,borderRadius:16,padding:"28px 20px",textAlign:"center",cursor:"pointer",marginBottom:14,transition:"border-color .2s"}}>
                <div style={{fontSize:40,marginBottom:8}}>📸</div>
                <div style={{fontSize:15,fontWeight:600,color:C.txt,marginBottom:4}}>{t.dropTitle}</div>
                <div style={{fontSize:13,color:C.txt3}}>{t.dropSub}</div>
              </div>
              <input ref={fileRef} type="file" multiple accept="image/*,.pdf" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
              {previews.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                  {previews.map((p,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden"}}>
                      <img src={p.url} alt={p.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.6)",fontSize:9.5,color:"#fff",padding:"3px 5px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                    </div>
                  ))}
                </div>
              )}
              {files.filter(f=>!f.type.startsWith("image/")).map((f,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:C.bg2,borderRadius:12,marginBottom:7,border:`1px solid ${C.border}`}}>
                  <span style={{fontSize:22}}>📄</span>
                  <span style={{flex:1,fontSize:13.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                  <span style={{fontSize:12,color:C.txt3}}>{f.size>1048576?(f.size/1048576).toFixed(1)+"MB":(f.size/1024).toFixed(0)+"KB"}</span>
                  <button onClick={()=>{setFiles(fs=>fs.filter((_,j)=>j!==i));setPreviews(ps=>ps.filter(p=>p.name!==f.name));}} style={{background:"none",border:"none",color:C.txt3,cursor:"pointer",fontSize:20,padding:"2px 6px"}}>✕</button>
                </div>
              ))}
              {files.length>0&&<div style={{fontSize:13,color:C.greenTxt,marginBottom:12,padding:"8px 12px",background:C.greenBg,borderRadius:10,border:`1px solid ${C.green}`}}>✓ {files.length} {t.filesSelected} ({files.filter(f=>f.type.startsWith("image/")).length} {t.photosSelected})</div>}
              <Sec>{t.analysisOpts}</Sec>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {[["photo","📷",t.photoOpt],["defect","🔍",t.defectOpt],["doc","📄",t.docOpt],["val","💰",t.valOpt]].map(([k,ic,l])=>(
                  <label key={k} onClick={()=>setAnOpts(o=>({...o,[k]:!o[k]}))} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",borderRadius:12,border:`1.5px solid ${anOpts[k]?C.blue:C.border2}`,background:anOpts[k]?C.blueBg:C.bg2,cursor:"pointer",transition:"all .15s"}}>

                    <span style={{fontSize:14,color:anOpts[k]?C.blueTxt:C.txt2,fontWeight:anOpts[k]?600:400}}>{l}</span>
                  </label>
                ))}
              </div>
              <Row gap={10}>
                <Btn v="primary" full icon="✨" onClick={analyzeFiles} disabled={busy.upload||!files.length}>
                  {busy.upload?<Spin msg={t.analysingMsg}/>:t.analyseBtn}

                {files.length>0&&<Btn icon="🗑" onClick={()=>{setFiles([]);setPreviews([]);setO("upload",null);}}>{t.clear}</Btn>}

            <div>

                <FG label={t.builtUp} half><Input type="number" value={prof.built} onChange={setP("built")} placeholder="1800" inputMode="numeric"/></FG>
                <FG label={t.bedrooms} half><Sel value={prof.rooms} onChange={setP("rooms")}><option value="">{t.select}</option>{["2","3","3+1","4","4+1","5+"].map(s=><option key={s}>{s}</option>)}</Sel></FG>

                </div>
              )}
              {subTab.analyze==="risk"&&(
                <div>
                  <Btn v="primary" full icon="🛡" onClick={runRisk} disabled={busy.risk} style={{marginBottom:14}}>
                    {busy.risk?<Spin msg={t.riskInProgress}/>:t.riskBtn}
                  </Btn>
                  {riskItems&&riskItems.map((r,i)=>{
                    const color=r.lv==="low"?C.green:r.lv==="high"?C.red:C.amber;
                    const bg=r.lv==="low"?C.greenBg:r.lv==="high"?C.redBg:C.amberBg;
                    const lbl=r.lv==="low"?t.lowRisk:r.lv==="high"?t.highRisk:t.medRisk;
                    return(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:14,border:`1.5px solid ${C.border}`,borderRadius:14,marginBottom:8}}>
                        <span style={{fontSize:12,padding:"4px 10px",borderRadius:20,background:bg,color,border:`1px solid ${color}`,flexShrink:0,marginTop:2,fontWeight:600}}>{lbl}</span>
                        <div><div style={{fontSize:15,fontWeight:600,color:C.txt,marginBottom:2}}>{r.title}</div><div style={{fontSize:13,color:C.txt2}}>{r.def}</div></div>
                      </div>
                    );
                  })}
                  <AiBox text={outs.risk} loading={busy.risk} msg={t.riskInProgress} ph={t.riskPh}/>
                </div>
              )}
            </div>
          )}

          {/* ── TOOLS ── */}
          {tab==="tools"&&(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>🧮 {t.toolsTitle}</div>
              <div style={{fontSize:13,color:C.txt2,marginBottom:14}}>{t.toolsSub}</div>
              <SubNav tabs={TTABS} active={subTab.tools} onChange={v=>setSubTab(s=>({...s,tools:v}))}/>
              {subTab.tools==="fin"&&(
                <div>
                  <Row gap={10}>
                    <FG label={t.purchasePrice} half><Input type="number" value={finV.price} onChange={setFv("price")} placeholder="680000" inputMode="numeric"/></FG>
                    <FG label={t.monthlyRental} half><Input type="number" value={finV.rent} onChange={setFv("rent")} placeholder="2400" inputMode="numeric"/></FG>
                    <FG label={t.downPay} half><Input type="number" value={finV.down} onChange={setFv("down")} placeholder="10"/></FG>
                    <FG label={t.interestRate} half><Input type="number" step="0.1" value={finV.rate} onChange={setFv("rate")} placeholder="4.0"/></FG>
                    <FG label={t.loanTenure} half><Sel value={finV.years} onChange={setFv("years")}><option value="35">{t.yr35}</option><option value="30">{t.yr30}</option><option value="25">{t.yr25}</option></Sel></FG>
                    <FG label={t.maintenance} half><Input type="number" value={finV.maint} onChange={setFv("maint")} placeholder="300" inputMode="numeric"/></FG>
                  </Row>
                  {finR?(
                    <>
                      <div style={{background:C.bg1,border:`1px solid ${C.border}`,borderRadius:16,padding:16}}>
                        {finR.rows.map(([l,v,color],i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:i<finR.rows.length-1?`1px solid ${C.border}`:"none",fontSize:14.5}}>
                            <span style={{color:C.txt2}}>{l}</span>
                            <span style={{fontWeight:700,color:color||C.txt}}>{v}</span>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:13.5,color:C.txt2,background:C.bg2,borderRadius:12,padding:"12px 14px",marginTop:10,borderLeft:`3px solid ${C.border2}`}}>{finR.tip}</div>
                    </>
                  ):<div style={{color:C.txt3,fontSize:14,marginTop:4}}>{t.finPh}</div>}
                  <div style={{fontSize:12,color:C.txt3,marginTop:12,padding:"8px 12px",background:C.bg2,borderRadius:10}}>{t.capTip}</div>
                </div>
              )}
              {subTab.tools==="report"&&(
                <div>
                  <Row gap={10} style={{marginBottom:0}}>
                    <Btn v="primary" full icon="📄" onClick={genReport} disabled={busy.report}>
                      {busy.report?<Spin msg={t.genReportMsg}/>:t.genReportBtn}
                    </Btn>
                    {reportSecs&&<Btn icon="📤" onClick={async()=>{const tx=reportSecs.map(s=>`${s.title}\n${s.body}`).join("\n\n");if(navigator.share)await navigator.share({title:"PropVal AI",text:tx});else if(navigator.clipboard)await navigator.clipboard.writeText(tx);}}>{t.shareBtn}</Btn>}
                  </Row>
                  <div style={{fontSize:12,color:C.txt3,padding:"10px 12px",background:C.bg2,borderRadius:10,marginTop:10,marginBottom:14}}>{t.disclaimer}</div>
                  {busy.report&&<div style={{padding:"16px 0"}}><Spin msg={t.genWait}/></div>}
                  {reportSecs&&reportSecs.map((s,i)=>(
                    <div key={i} style={{border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:10}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.txt2,marginBottom:8}}>{["📋","🏠","📈","🔢","💰","⚠️"][i]||"📌"} {s.title}</div>
                      <div style={{fontSize:13.5,color:C.txt,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{s.body}</div>
                    </div>
                  ))}
                  {!busy.report&&!reportSecs&&<AiBox text={null} ph={t.reportPh}/>}
                </div>
              )}
            </div>
          )}

        </div>
      </div>

      {/* BOTTOM NAV */}
      <div style={{background:C.bg1,borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} className="nav-btn" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",color:tab===n.id?C.blue:C.txt3,transition:"color .15s",fontFamily:"inherit",position:"relative"}}>
            <span style={{fontSize:22}}>{n.icon}</span>
            <span style={{fontSize:10.5,fontWeight:tab===n.id?700:400}}>{n.label}</span>
            {tab===n.id&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:2.5,background:C.blue,borderRadius:2}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

document.getElementById("loading").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(<PropValAI/>);
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
</script>
</body>
</html>
